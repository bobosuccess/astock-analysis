automation:
  master_switch: false
  # ========== 付费安全原则 ==========
  # 所有涉及付费的服务，一旦出现以下情况，立即停止自动化：
  # 1. 免费额度耗尽前发出预警
  # 2. 需要付费才能继续 → 立即停止 + 微信通知人工判断
  # 3. 检测到任何付费订阅/变更为付费 → 立即停止
  # 自动恢复方式：人工确认后，将 master_switch 改为 true
  quota_guard:
    enabled: true
    auto_stop: true          # 额度耗尽时自动停止（不自动付费）
    alert_before_limit: 0.8  # 使用80%时发出预警
    daily_check_enabled: true  # 每日早间自动检查额度
  layers:
    realtime:
      enabled: true
    batch:
      enabled: true
    ai_analysis:
      enabled: true
    push_notification:
      enabled: false
  tasks:
    evening_report:
      enabled: true
      time: '19:50'
    intelligence_digest:
      enabled: true
      time: '19:45'
    morning_report:
      enabled: true
      time: 07:00
    realtime_monitor:
      enabled: true
      interval_minutes: 5
    sentiment_monitor:
      enabled: true
      interval_minutes: 15
    news_interpret:
      enabled: true
      time: '19:30'
    evening_review:
      enabled: true
      time: '20:00'
    self_summary:
      enabled: true
      time: '22:00'
    full_scan:
      enabled: false
      time: '21:00'
  presets:
    normal_trading_day:
      master_switch: true
      layers:
        realtime: true
        batch: true
        ai_analysis: true
        push_notification: true
      tasks:
        morning_report: true
        realtime_monitor: true
        sentiment_monitor: true
        news_interpret: true
        evening_report: true
        evening_review: true
        self_summary: true
        full_scan: false
    testing:
      master_switch: true
      layers:
        realtime: true
        batch: true
        ai_analysis: false
        push_notification: true
      tasks:
        morning_report: true
        realtime_monitor: true
        sentiment_monitor: false
        news_interpret: false
        evening_report: true
        evening_review: true
        self_summary: false
        full_scan: false
    manual_mode:
      master_switch: false
    weekend:
      master_switch: true
      layers:
        realtime: false
        batch: true
        ai_analysis: true
        push_notification: true
      tasks:
        morning_report: false
        realtime_monitor: false
        sentiment_monitor: false
        news_interpret: true
        evening_report: false
        evening_review: false
        self_summary: true
        full_scan: false
data_sources:
  realtime:
    primary: akshare
    backup1: tencent
    backup2: eastmoney
    timeout_seconds: 10
    retry_times: 2
  history:
    primary: akshare
    backup1: baostock
    timeout_seconds: 30
    retry_times: 1
  news:
    primary: sina
    backup1: eastmoney
    timeout_seconds: 15
    retry_times: 2
push:
  serverchan:
    enabled: true
    sckey: YOUR_SCKEY_HERE
    daily_limit: 100
  bark:
    enabled: false
    bark_key: YOUR_BARK_KEY_HERE
portfolio:
  # 自选股池配置（实时监控使用）
  # 格式1（简单）: ["000001.SZ", "600519.SS"]
  # 格式2（带止损）: [{"code": "000001.SZ", "stop_loss": 12.50}, {"code": "600519.SS", "stop_loss": 1600}]
  positions: []
quota_alert:
  render_hours:
    threshold: 100
    warning: 150
  github_actions_minutes:
    daily_threshold: 300
    weekly_threshold: 1000
  groq_api_calls:
    daily_threshold: 500
  feifei_api_calls:
    daily_threshold: 300
