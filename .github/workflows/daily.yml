name: A股分析系统 - 每日自动化

permissions:
  contents: write  # 允许 update_badge 任务写入配额记录

on:
  # ========== 定时触发 ==========
  schedule:
    # 晚间简报 19:50 (北京时间) = 11:50 UTC
    - cron: '50 11 * * *'
    # 晚间复盘 20:00 (北京时间) = 12:00 UTC
    - cron: '0 12 * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      task:
        description: '选择任务'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - evening_report       # 19:50 晚间简报+情报
          - evening_review       # 20:00 晚间复盘
          - news_interpret       # AI新闻解读
          - self_summary         # 月度自我总结

env:
  TZ: Asia/Shanghai

jobs:
  # ========== 额度检查（优先运行）==========
  quota_check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt -q

      - name: 额度检查
        env:
          SCKEY: ${{ secrets.SCKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "=== 额度检查开始 ==="
          python scripts/quota_monitor.py --quiet
          echo "=== 额度检查完成 ==="

  # ========== 晨间简报 ==========
  morning_report:
    if: ${{ true }}  # 始终可触发，实际开关在脚本内判断
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt -q

      - name: 读取自动化开关
        run: |
          # 读取master_switch
          MASTER=$(grep -A1 'master_switch:' automation.yaml | tail -1 | awk '{print $2}')
          echo "master_switch: $MASTER"
          if [ "$MASTER" != "true" ]; then
            echo "自动化总开关已关闭，跳过任务"
            exit 0
          fi

      - name: 执行晨间简报
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python scripts/morning_report.py

  # ========== 新闻解读 ==========
  news_interpret:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.task == 'news_interpret' || github.event.inputs.task == 'all' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt -q

      - name: 检查自动化开关
        run: |
          MASTER=$(grep -A1 'master_switch:' automation.yaml | tail -1 | awk '{print $2}')
          if [ "$MASTER" != "true" ]; then
            echo "master_switch=false，跳过 news_interpret"
            exit 0
          fi

      - name: 执行AI新闻解读
        env:
          SCKEY: ${{ secrets.SCKEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/news_interpret.py

  # ========== 晚间简报 (19:50) ==========
  evening_report:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.task == 'evening_report' || github.event.inputs.task == 'all' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt -q

      - name: 检查自动化开关
        run: |
          MASTER=$(grep -A1 'master_switch:' automation.yaml | tail -1 | awk '{print $2}')
          if [ "$MASTER" != "true" ]; then
            echo "master_switch=false，跳过 evening_report"
            exit 0
          fi

      - name: 执行晚间简报
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python scripts/evening_report.py

  # ========== 晚间复盘 (20:00) ==========
  evening_review:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.task == 'evening_review' || github.event.inputs.task == 'all' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt -q

      - name: 检查自动化开关
        run: |
          MASTER=$(grep -A1 'master_switch:' automation.yaml | tail -1 | awk '{print $2}')
          if [ "$MASTER" != "true" ]; then
            echo "master_switch=false，跳过 evening_review"
            exit 0
          fi

      - name: 执行晚间复盘
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python scripts/evening_review.py

  # ========== 每日自我总结 ==========
  self_summary:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.task == 'self_summary' || github.event.inputs.task == 'all' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt -q

      - name: 检查自动化开关
        run: |
          MASTER=$(grep -A1 'master_switch:' automation.yaml | tail -1 | awk '{print $2}')
          if [ "$MASTER" != "true" ]; then
            echo "master_switch=false，跳过 self_summary"
            exit 0
          fi

      - name: 执行自我总结
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python scripts/self_summary.py

  # ========== 更新配额Badge ==========
  update_badge:
    needs: [evening_report, evening_review, news_interpret, self_summary]
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 更新使用量
        run: |
          python -c "
          import datetime
          from pathlib import Path

          badge_path = Path('data/quota_usage.md')
          today = datetime.date.today().isoformat()

          # 读取当前数据
          content = badge_path.read_text() if badge_path.exists() else '# 配额使用记录\n\n'
          content += f'- {today}: 任务执行完成\n'

          badge_path.write_text(content[-2000:])  # 保留最近记录
          print('配额记录已更新')
          "

      - name: 提交更新
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "docs: 更新配额记录 $(date +%Y-%m-%d)"
          git pull origin main --rebase || true
          git push
